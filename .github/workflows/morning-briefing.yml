name: Daily Morning Briefing

# 每個交易日台北時間 08:30 觸發（00:30 UTC，台灣無日光節約時間，換算固定）。
# 不篩選台灣國定假日 —— 若當天休市，/generate 會用當時 TWSE/yfinance 能取得的最新資料產生
# 一份快照，屬已知的 MVP 限制，不在本次處理範圍內。
on:
  schedule:
    - cron: "30 0 * * 1-5"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning briefing generation
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: curl -sf --max-time 300 -X POST -H "X-API-Key: $BACKEND_API_KEY" "https://stock-backend-884724294224.asia-east1.run.app/api/v1/morning-briefing/generate"
